<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — Qara Bazar</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230A0A0A'/%3E%3Ctext x='50' y='69' font-family='Helvetica,Arial,sans-serif' font-size='58' font-weight='bold' fill='%23FFFFFF' text-anchor='middle'%3EQ%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="qb-logo" viewBox="0 0 160 150">
      <g fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
        <g transform="translate(18, 10)">
          <!-- Q -->
          <polygon points="0,20 12,0 24,20 24,40 12,60 0,40" />
          <line x1="8" y1="30" x2="30" y2="75" />
          <!-- A -->
          <g transform="translate(32, 0)"><polyline points="0,60 0,20 12,0 24,20 24,60" /><line x1="0" y1="35" x2="24" y2="35" /></g>
          <!-- R -->
          <g transform="translate(64, 0)"><polyline points="0,60 0,20 12,0 24,20 0,40" /><line x1="10" y1="30" x2="24" y2="60" /></g>
          <!-- A -->
          <g transform="translate(96, 0)"><polyline points="0,60 0,20 12,0 24,20 24,60" /><line x1="0" y1="35" x2="24" y2="35" /></g>
        </g>
        <g transform="translate(2, 80)">
          <!-- B -->
          <line x1="0" y1="0" x2="0" y2="60" />
          <polyline points="0,0 22,15 0,30" />
          <polyline points="0,30 24,45 0,60" />
          <!-- A -->
          <g transform="translate(32, 0)"><polyline points="0,60 0,20 12,0 24,20 24,60" /><line x1="0" y1="35" x2="24" y2="35" /></g>
          <!-- Z -->
          <g transform="translate(64, 0)"><polyline points="0,0 24,0 0,60 24,60" /></g>
          <!-- A -->
          <g transform="translate(96, 0)"><polyline points="0,60 0,20 12,0 24,20 24,60" /><line x1="0" y1="35" x2="24" y2="35" /></g>
          <!-- R -->
          <g transform="translate(128, 0)"><polyline points="0,60 0,20 12,0 24,20 0,40" /><line x1="10" y1="30" x2="24" y2="60" /></g>
        </g>
      </g>
    </symbol>
  </defs>
</svg>

<!-- ЭКРАН ВХОДА -->
<div class="login-screen" id="loginScreen" hidden>
  <form class="login-card" id="loginForm">
    <div style="display:flex; justify-content:center; margin-bottom:10px">
      <svg style="height:64px; color:var(--gold)"><use href="#qb-logo"/></svg>
    </div>
    <p class="login-sub">панель управления базаром</p>
    <label>Логин<input type="text" name="login" required autocomplete="username"></label>
    <label>Пароль<input type="password" name="password" required autocomplete="current-password"></label>
    <p class="login-error" id="loginError" hidden></p>
    <button type="submit" class="a-btn a-btn-gold a-btn-block">Войти</button>
  </form>
</div>

<!-- ПАНЕЛЬ -->
<div class="admin-shell" id="adminShell" hidden>
  <aside class="a-sidebar">
    <a class="a-logo" href="/" target="_blank" title="Открыть витрину" style="display:flex; justify-content:center; margin-bottom:10px">
      <svg style="height:48px; color:var(--gold)"><use href="#qb-logo"/></svg>
    </a>
    <nav class="a-nav" id="adminNav">
      <button data-view="dashboard" class="active">◆ Обзор</button>
      <button data-view="products">◆ Товары</button>
      <button data-view="orders">◆ Заказы <span class="a-nav-badge" id="newOrdersBadge" hidden></span></button>
      <button data-view="sellers">◆ Мастера</button>
      <button data-view="categories">◆ Категории</button>
      <button data-view="users">◆ Клиенты</button>
      <button data-view="reviews">◆ Отзывы</button>
      <button data-view="settings">◆ Настройки</button>
    </nav>
    <div class="a-sidebar-foot">
      <a href="/" target="_blank">Витрина ↗</a>
      <button id="logoutBtn">Выйти</button>
    </div>
  </aside>

  <main class="a-main">
    <div id="viewRoot"></div>
  </main>
</div>

<!-- МОДАЛКА -->
<div class="a-modal-backdrop" id="modalBackdrop" hidden>
  <div class="a-modal" id="modalBox" role="dialog" aria-modal="true"></div>
</div>

<div class="a-toast-stack" id="aToastStack"></div>

<script src="/admin/admin.js"></script>
</body>
</html>
